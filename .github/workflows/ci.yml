name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci-base.yml
    with:
      crystal-version: latest

  ameba:
    uses: ./.github/workflows/ameba.yml
